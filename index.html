<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D建模作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #222;
        }
        .header p {
            font-size: 16px;
            color: #666;
        }
        .item {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .item h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #222;
        }
        .item p {
            color: #666;
            margin-bottom: 15px;
        }
        .item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
        .contact {
            text-align: center;
            margin-top: 50px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>3D 建模作品集</h1>
    <p>擅长：3ds Max 场景建模 / 道具建模 / 低模卡通 / 古风场景</p>
    <p>求职意向：游戏建模实习生 / 场景 / 道具模型相关</p>
</div>

<!-- 作品1 -->
<div class="item">
    <h2>场景建模 · 卡通风格店铺</h2>
    <p>软件：3ds Max<br>低模卡通场景，注重结构层次与道具组合排布，练习整体空间感。</p>
    <img src="卡通场景1.jpg" alt="卡通店铺">
</div>

<!-- 作品2 -->
<div class="item">
    <h2>场景建模 · 古风建筑</h2>
    <p>软件：3ds Max<br>古风风格场景，练习传统建筑结构、屋顶造型与整体比例。</p>
    <img src="古风阁楼.jpg" alt="古风建筑">
</div>

<!-- 作品3 -->
<div class="item">
    <h2>道具建模 · 卡通武器</h2>
    <p>软件：3ds Max<br>低模道具练习，侧重轮廓造型、比例控制与简洁布线。</p>
    <img src="武器刀.jpg" alt="卡通武器">
    <img src="武器刀2.jpg" alt="卡通武器">
    <img src="武器锤子.jpg" alt="卡通武器">
</div>

<!-- 作品4 -->
<div class="item">
    <h2>场景建模 · 卡通组合场景</h2>
    <p>软件：3ds Max<br>小型综合场景练习，练习道具摆放、风格统一与构图。</p>
    <img src="卡通场景2.jpg" alt="组合场景">
</div>

<div class="contact">
    <p>持续学习中</p>
</div>

</body>
</html>
